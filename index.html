
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aspenini Fun Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <h1>Welcome to Aspenini Fun Hub!</h1>
    <p>Choose a game below to start playing:</p>

    <div class="game">
        <h2>Game 1</h2>
        <p><a href="/game1">Play Game 1</a></p>
    </div>

    <div class="game">
        <h2>Tetris</h2>
        <a href="game2/index.html">
            <img src="img/tetris_logo.jpg" alt="Tetris" class="bounce">
        </a>
    </div>

    <div class="game">
        <h2>Legacy Kevin Klicker</h2>
        <a href="game3/index.html">
            <img src="img/LegacyKevinKlicker.png" alt="Legacy Kevin Klicker" class="bounce">
        </a>
    </div>

    <footer>
        <p>© 2024 Aspenini Fun Hub</p>
    </footer>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js')
                .then((registration) => {
                    console.log('Service Worker registered with scope:', registration.scope);
                })
                .catch((error) => {
                    console.log('Service Worker registration failed:', error);
                });
        }
    </script>
</body>
</html>
