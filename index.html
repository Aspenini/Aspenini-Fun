<!DOCTYPE html>

    <link rel="stylesheet" href="style.css">

<body>

    <div id="settings-menu" style="position: fixed; top: 10px; left: 10px;">
        <img src="img/settings-icon.png" alt="Settings" style="width: 50px; cursor: pointer;" onclick="toggleSettingsMenu()">
    </div>

    <div id="settings-options" style="display: none; position: fixed; top: 70px; left: 10px; background-color: white; padding: 10px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);">
        <label for="theme-select">Choose a theme:</label>
        <select id="theme-select" onchange="changeTheme(this.value)">
            <option value="light">Light</option>
            <option value="dark">Dark</option>
            <option value="blue">Blue</option>
        </select>
    </div>

    <script>
        function toggleSettingsMenu() {
            const settingsMenu = document.getElementById('settings-options');
            settingsMenu.style.display = settingsMenu.style.display === 'none' ? 'block' : 'none';
        }

        function changeTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme); // Save theme preference
        }

        // Load saved theme
        const savedTheme = localStorage.getItem('theme') || 'light';
        changeTheme(savedTheme);
    </script>

        Aspenini.Fun - Your Game Hub
