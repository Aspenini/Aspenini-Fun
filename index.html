<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Aspenini.Fun - Your Hub for Fun HTML Games!">
    <title>Aspenini.Fun - Game Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="settings-menu" style="position: fixed; top: 10px; left: 10px;">
    <img src="img/settings-icon.png" alt="Settings" style="width: 50px; cursor: pointer;" onclick="toggleSettingsMenu()">
</div>

<div id="settings-options" style="display: none; position: fixed; top: 70px; left: 10px; background-color: white; padding: 10px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);">
    <label for="theme-select">Choose a theme:</label>
    <select id="theme-select" onchange="changeTheme(this.value)">
        <option value="light">Light</option>
        <option value="dark">Dark</option>
        <option value="blue">Blue</option>
    </select>
</div>

<script>
    function toggleSettingsMenu() {
        const settingsMenu = document.getElementById('settings-options');
        if (settingsMenu.style.display === 'none') {
            settingsMenu.style.display = 'block';
        } else {
            settingsMenu.style.display = 'none';
        }
    }

    function changeTheme(theme) {
        if (theme === 'dark') {
            document.documentElement.style.setProperty('--background-color', '#121212');
            document.documentElement.style.setProperty('--text-color', '#ffffff');
            document.documentElement.style.setProperty('--header-color', '#1E1E1E');
        } else if (theme === 'light') {
            document.documentElement.style.setProperty('--background-color', '#f4f4f4');
            document.documentElement.style.setProperty('--text-color', '#333');
            document.documentElement.style.setProperty('--header-color', '#4CAF50');
        } else if (theme === 'blue') {
            document.documentElement.style.setProperty('--background-color', '#dcefff');
            document.documentElement.style.setProperty('--text-color', '#002d5f');
            document.documentElement.style.setProperty('--header-color', '#003f88');
        }
    }
</script>


    <header>
        Aspenini.Fun - Your Game Hub
    </header>

    <section>
        <h2>Current Games</h2>
        <div class="game-list">
            <div class="game">
                <a href="tetris/index.html">
                    <img src="img/tetris.jpg" alt="Tetris">
                    <h3>Tetris</h3>
                </a>
            </div>
            <div class="game">
                <a href="eaglercraft/index.html">
                    <img src="img/eaglercraft.jpg" alt="Eaglercraft">
                    <h3>Eaglercraft</h3>
                </a>
            </div>
            <div class="game">
                <a href="roulette/index.html">
                    <img src="img/roulette.jpg" alt="Roulette">
                    <h3>Roulette</h3>
                </a>
            </div>
            <div class="game">
                <a href="space-invaders/index.html">
                    <img src="img/space-invaders.jpg" alt="Space Invaders">
                    <h3>Space Invaders</h3>
                </a>
            </div>
        </div>
    </section>

    <section>
        <h2>Legacy Games</h2>
        <div class="game-list legacy-games">
            <div class="game">
                <a href="legacy-tetris/index.html">
                    <img src="img/legacy-tetris.jpg" alt="Legacy Tetris">
                    <h3>Legacy Tetris</h3>
                </a>
            </div>
            <div class="game">
                <a href="legacy-kevin-klicker/index.html">
                    <img src="img/legacy-kevin-klicker.png" alt="Kevin Klicker">
                    <h3>Kevin Klicker</h3>
                </a>
            </div>
        </div>
    </section>

    <footer>
        © 2024 Aspenini.Fun - All rights reserved.
    </footer>

</body>
</html>
