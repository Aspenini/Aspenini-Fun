<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="aspenini-game-id" content="poker">
    <title>Video Poker - Aspenini-Fun</title>
    <link rel="stylesheet" href="../shared-theme.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <header class="topbar">
        <div class="topbar-left">
            <h1>♠️ Video Poker ♥️</h1>
        </div>
        <div class="topbar-right">
            <div class="balance-display">
                <span class="label">Credits:</span>
                <span id="balance" class="balance">1000</span>
            </div>
            <div class="balance-display" style="margin-left: 15px;">
                <span class="label">High Score:</span>
                <span id="highScore" class="balance">1000</span>
            </div>
        </div>
    </header>

    <main class="game-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="payout-table">
                <h3>Payouts (Bet: <span id="betDisplay">5</span>)</h3>
                <div class="payout-item" data-hand="royal-flush">
                    <span class="payout-name">Royal Flush</span>
                    <span class="payout-value" id="payout-royal">800</span>
                </div>
                <div class="payout-item" data-hand="straight-flush">
                    <span class="payout-name">Straight Flush</span>
                    <span class="payout-value" id="payout-straight-flush">50</span>
                </div>
                <div class="payout-item" data-hand="four-kind">
                    <span class="payout-name">Four of a Kind</span>
                    <span class="payout-value" id="payout-four">25</span>
                </div>
                <div class="payout-item" data-hand="full-house">
                    <span class="payout-name">Full House</span>
                    <span class="payout-value" id="payout-full">9</span>
                </div>
                <div class="payout-item" data-hand="flush">
                    <span class="payout-name">Flush</span>
                    <span class="payout-value" id="payout-flush">6</span>
                </div>
                <div class="payout-item" data-hand="straight">
                    <span class="payout-name">Straight</span>
                    <span class="payout-value" id="payout-straight">4</span>
                </div>
                <div class="payout-item" data-hand="three-kind">
                    <span class="payout-name">Three of a Kind</span>
                    <span class="payout-value" id="payout-three">3</span>
                </div>
                <div class="payout-item" data-hand="two-pair">
                    <span class="payout-name">Two Pair</span>
                    <span class="payout-value" id="payout-two-pair">2</span>
                </div>
                <div class="payout-item" data-hand="jacks-better">
                    <span class="payout-name">Jacks or Better</span>
                    <span class="payout-value" id="payout-jacks">1</span>
                </div>
            </div>

            <div class="stats-section">
                <h3>Statistics</h3>
                <div class="stat-item">
                    <span class="stat-label">Hands Played:</span>
                    <span class="stat-value" id="handsPlayed">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Hands Won:</span>
                    <span class="stat-value" id="handsWon">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Win Rate:</span>
                    <span class="stat-value" id="winRate">0%</span>
                </div>
                <div class="stat-item highlight">
                    <span class="stat-label">🏆 High Score:</span>
                    <span class="stat-value" id="highScoreStat">1000</span>
                </div>
            </div>
        </aside>

        <!-- Game Area -->
        <div class="game-area">
            <div class="message-area">
                <div class="message-box" id="messageBox">
                    Place your bet and deal!
                </div>
            </div>

            <div class="cards-container" id="cardsContainer">
                <!-- Cards will be added here -->
            </div>

            <div class="controls-area">
                <div class="bet-controls">
                    <label for="betAmount">Bet Amount:</label>
                    <input type="number" id="betAmount" min="1" max="100" value="5" step="1">
                    <div class="bet-buttons">
                        <button class="bet-btn" data-bet="1">1</button>
                        <button class="bet-btn" data-bet="5">5</button>
                        <button class="bet-btn" data-bet="10">10</button>
                        <button class="bet-btn" data-bet="25">25</button>
                        <button class="bet-btn" data-bet="max">MAX</button>
                    </div>
                </div>

                <div class="action-buttons">
                    <button id="dealBtn" class="game-btn primary">Deal</button>
                    <button id="drawBtn" class="game-btn" disabled>Draw</button>
                </div>
            </div>
        </div>
    </main>

    <script src="../../aspenini-sdk.js"></script>
    <script src="script.js"></script>
</body>
</html>
